backend:
  name: github
  repo: username/desa-makmurjaya        # ganti dengan repo aktual
  branch: main
  base_url: https://api.netlify.com     # Netlify sebagai OAuth proxy
  auth_endpoint: auth

media_folder: "public/uploads"
public_folder: "/website-desa-makmurjaya/uploads"

locale: id

collections:
  - name: "berita"
    label: "Berita"
    label_singular: "Artikel Berita"
    folder: "src/content/berita"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Judul", name: "judul", widget: "string", required: true }
      - { label: "Slug URL", name: "slug", widget: "string", required: true,
          hint: "Contoh: peluncuran-website-desa (huruf kecil, tanda hubung)" }
      - { label: "Tanggal Publikasi", name: "tanggal", widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Foto Thumbnail", name: "foto_thumbnail", widget: "image",
          required: false, hint: "Maks 5MB. Format: JPG, PNG, WebP" }
      - { label: "Cuplikan", name: "cuplikan", widget: "text", required: false,
          hint: "Ringkasan singkat artikel (maks 300 karakter)" }
      - { label: "Penulis", name: "penulis", widget: "string", required: false }
      - { label: "Status", name: "status", widget: "select",
          options: ["draft", "published"], default: "draft" }
      - { label: "Isi Berita", name: "body", widget: "markdown" }

  - name: "pengumuman"
    label: "Pengumuman"
    folder: "src/content/pengumuman"
    create: true
    delete: true
    fields:
      - { label: "Judul", name: "judul", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "select",
          options: ["pengumuman", "agenda"] }
      - { label: "Tanggal Publikasi", name: "tanggal", widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Tanggal Pelaksanaan (khusus Agenda)", name: "tanggal_pelaksanaan",
          widget: "datetime", date_format: "YYYY-MM-DD", time_format: false,
          required: false }
      - { label: "Waktu Pelaksanaan", name: "waktu_pelaksanaan", widget: "string",
          required: false, hint: "Contoh: 09.00 WIB" }
      - { label: "Cuplikan", name: "cuplikan", widget: "text", required: false }
      - { label: "Status", name: "status", widget: "select",
          options: ["draft", "published"], default: "draft" }
      - label: "Lampiran"
        name: "lampiran"
        widget: "list"
        required: false
        fields:
          - { label: "Nama File", name: "nama_file", widget: "string" }
          - { label: "File", name: "url", widget: "file" }
          - { label: "Ukuran (KB)", name: "ukuran_kb", widget: "number",
              required: false }
      - { label: "Isi Pengumuman", name: "body", widget: "markdown" }

  - name: "wisata"
    label: "Destinasi Wisata"
    folder: "src/content/wisata"
    create: true
    delete: true
    fields:
      - { label: "Nama Destinasi", name: "nama", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Foto Utama", name: "foto_utama", widget: "image", required: false,
          hint: "Maks 5MB. Format: JPG, PNG, WebP" }
      - { label: "Deskripsi Singkat", name: "deskripsi_singkat", widget: "text" }
      - { label: "Jam Operasional", name: "jam_operasional", widget: "string",
          required: false, hint: "Contoh: Senin-Minggu, 07.00-17.00 WIB" }
      - { label: "Harga Tiket", name: "harga_tiket", widget: "string",
          required: false, hint: "Contoh: Rp 10.000/orang, atau Gratis" }
      - { label: "Kontak Narahubung", name: "kontak", widget: "string",
          required: false }
      - { label: "Petunjuk Akses", name: "petunjuk_akses", widget: "text",
          required: false }
      - { label: "Latitude Peta", name: "lokasi_lat", widget: "number",
          required: false, value_type: "float" }
      - { label: "Longitude Peta", name: "lokasi_lng", widget: "number",
          required: false, value_type: "float" }
      - { label: "Label Peta", name: "lokasi_label", widget: "string",
          required: false }
      - { label: "Galeri Foto", name: "galeri_foto", widget: "list",
          field: { label: "Foto", name: "foto", widget: "image" }, required: false }
      - { label: "Status", name: "status", widget: "select",
          options: ["draft", "published"], default: "draft" }
      - { label: "Deskripsi Lengkap", name: "body", widget: "markdown" }

  - name: "umkm"
    label: "UMKM"
    folder: "src/content/umkm"
    create: true
    delete: true
    fields:
      - { label: "Nama Usaha", name: "nama_usaha", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Pemilik", name: "pemilik", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "string", required: false,
          hint: "Contoh: Kerajinan, Kuliner, Pertanian, Jasa" }
      - { label: "Jenis Produk", name: "jenis_produk", widget: "string" }
      - { label: "Range Harga", name: "harga_range", widget: "string",
          required: false, hint: "Contoh: Rp 15.000 - Rp 50.000" }
      - { label: "Nomor WhatsApp", name: "kontak_wa", widget: "string",
          hint: "Format: 628XXXXXXXXX (tanpa spasi, tanda plus, atau tanda hubung)" }
      - { label: "Alamat", name: "alamat", widget: "string", required: false }
      - { label: "Foto Utama", name: "foto_utama", widget: "image", required: false,
          hint: "Maks 5MB. Format: JPG, PNG, WebP" }
      - { label: "Galeri Produk", name: "galeri_foto", widget: "list",
          field: { label: "Foto", name: "foto", widget: "image" }, required: false }
      - { label: "Status", name: "status", widget: "select",
          options: ["draft", "published"], default: "draft" }
      - { label: "Deskripsi Usaha", name: "body", widget: "markdown" }

  - name: "galeri"
    label: "Galeri Foto"
    folder: "src/content/galeri"
    create: true
    delete: true
    extension: "json"
    format: "json"
    fields:
      - { label: "Judul Foto", name: "judul_foto", widget: "string" }
      - { label: "File Foto", name: "file_foto", widget: "image",
          hint: "Maks 5MB. Format: JPG, PNG, WebP" }
      - { label: "Caption", name: "caption", widget: "text", required: false }
      - { label: "Album/Kategori", name: "album", widget: "string",
          default: "Umum" }
      - { label: "Tanggal Upload", name: "tanggal_upload", widget: "datetime",
          date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Urutan", name: "urutan", widget: "number", default: 0 }

  - name: "perangkat-desa"
    label: "Perangkat Desa"
    folder: "src/content/perangkat-desa"
    create: true
    delete: true
    fields:
      - { label: "Nama", name: "nama", widget: "string" }
      - { label: "Slug URL", name: "slug", widget: "string" }
      - { label: "Jabatan", name: "jabatan", widget: "string" }
      - { label: "Foto", name: "foto", widget: "image", required: false,
          hint: "Maks 5MB. Format: JPG, PNG, WebP" }
      - { label: "Urutan Tampil", name: "urutan", widget: "number", default: 99 }
      - { label: "Level Hierarki", name: "level_hierarki", widget: "number",
          default: 1, hint: "1=Kepala Desa, 2=Sekretaris, 3=Kepala Seksi, 4=Staf" }
      - { label: "Atasan (slug)", name: "parent_slug", widget: "string",
          required: false, hint: "Isi slug jabatan atasan langsung" }
      - { label: "Kontak", name: "kontak", widget: "string", required: false }
      - { label: "Tugas Pokok", name: "body", widget: "markdown" }

  - name: "faq"
    label: "FAQ (Tanya Jawab)"
    folder: "src/content/faq"
    create: true
    delete: true
    fields:
      - { label: "Pertanyaan", name: "pertanyaan", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "string", required: false }
      - { label: "Urutan", name: "urutan", widget: "number", default: 99 }
      - { label: "Jawaban", name: "body", widget: "markdown" }

  - name: "halaman-statis"
    label: "Halaman Statis"
    folder: "src/content/halaman-statis"
    create: false
    delete: false
    fields:
      - { label: "Judul", name: "judul", widget: "string" }
      - { label: "Tipe Halaman", name: "tipe", widget: "select",
          options: ["profil-sejarah", "profil-visi-misi", "profil-lokasi",
                    "kontak-info"] }
      - { label: "Latitude (untuk peta)", name: "lokasi_lat", widget: "number",
          required: false, value_type: "float" }
      - { label: "Longitude (untuk peta)", name: "lokasi_lng", widget: "number",
          required: false, value_type: "float" }
      - { label: "Label Peta", name: "lokasi_label", widget: "string",
          required: false }
      - { label: "Konten", name: "body", widget: "markdown" }
