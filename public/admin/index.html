<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin CMS — Website Desa Makmurjaya</title>
  <style>
    /* Loading state */
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <script>
    // Prevent auto-init — we need to set site_id manually
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'Jeff146354/website-desa-makmurjaya',
          branch: 'main',
          base_url: 'https://api.netlify.com',
          auth_endpoint: 'auth',
          site_id: 'thunderous-lebkuchen-7c63f3.netlify.app'
        },
        media_folder: 'public/uploads',
        public_folder: '/website-desa-makmurjaya/uploads',
        locale: 'id',
        collections: [
          {
            name: 'berita',
            label: 'Berita',
            label_singular: 'Artikel Berita',
            folder: 'src/content/berita',
            create: true,
            delete: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Judul', name: 'judul', widget: 'string', required: true },
              { label: 'Slug URL', name: 'slug', widget: 'string', required: true, hint: 'Contoh: peluncuran-website-desa (huruf kecil, tanda hubung)' },
              { label: 'Tanggal Publikasi', name: 'tanggal', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Foto Thumbnail', name: 'foto_thumbnail', widget: 'image', required: false, hint: 'Maks 5MB. Format: JPG, PNG, WebP' },
              { label: 'Cuplikan', name: 'cuplikan', widget: 'text', required: false, hint: 'Ringkasan singkat artikel (maks 300 karakter)' },
              { label: 'Penulis', name: 'penulis', widget: 'string', required: false },
              { label: 'Status', name: 'status', widget: 'select', options: ['draft', 'published'], default: 'draft' },
              { label: 'Isi Berita', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'pengumuman',
            label: 'Pengumuman',
            folder: 'src/content/pengumuman',
            create: true,
            delete: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Judul', name: 'judul', widget: 'string' },
              { label: 'Slug URL', name: 'slug', widget: 'string' },
              { label: 'Kategori', name: 'kategori', widget: 'select', options: ['pengumuman', 'agenda'] },
              { label: 'Tanggal Publikasi', name: 'tanggal', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Tanggal Pelaksanaan (khusus Agenda)', name: 'tanggal_pelaksanaan', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false, required: false },
              { label: 'Waktu Pelaksanaan', name: 'waktu_pelaksanaan', widget: 'string', required: false, hint: 'Contoh: 09.00 WIB' },
              { label: 'Cuplikan', name: 'cuplikan', widget: 'text', required: false },
              { label: 'Status', name: 'status', widget: 'select', options: ['draft', 'published'], default: 'draft' },
              { label: 'Lampiran', name: 'lampiran', widget: 'list', required: false, fields: [
                { label: 'Nama File', name: 'nama_file', widget: 'string' },
                { label: 'File', name: 'url', widget: 'file' },
                { label: 'Ukuran (KB)', name: 'ukuran_kb', widget: 'number', required: false }
              ]},
              { label: 'Isi Pengumuman', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'wisata',
            label: 'Destinasi Wisata',
            folder: 'src/content/wisata',
            create: true,
            delete: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Nama Destinasi', name: 'nama', widget: 'string' },
              { label: 'Slug URL', name: 'slug', widget: 'string' },
              { label: 'Foto Utama', name: 'foto_utama', widget: 'image', required: false, hint: 'Maks 5MB. Format: JPG, PNG, WebP' },
              { label: 'Deskripsi Singkat', name: 'deskripsi_singkat', widget: 'text' },
              { label: 'Jam Operasional', name: 'jam_operasional', widget: 'string', required: false, hint: 'Contoh: Senin-Minggu, 07.00-17.00 WIB' },
              { label: 'Harga Tiket', name: 'harga_tiket', widget: 'string', required: false, hint: 'Contoh: Rp 10.000/orang, atau Gratis' },
              { label: 'Kontak Narahubung', name: 'kontak', widget: 'string', required: false },
              { label: 'Petunjuk Akses', name: 'petunjuk_akses', widget: 'text', required: false },
              { label: 'Latitude Peta', name: 'lokasi_lat', widget: 'number', required: false, value_type: 'float' },
              { label: 'Longitude Peta', name: 'lokasi_lng', widget: 'number', required: false, value_type: 'float' },
              { label: 'Label Peta', name: 'lokasi_label', widget: 'string', required: false },
              { label: 'Galeri Foto', name: 'galeri_foto', widget: 'list', field: { label: 'Foto', name: 'foto', widget: 'image' }, required: false },
              { label: 'Status', name: 'status', widget: 'select', options: ['draft', 'published'], default: 'draft' },
              { label: 'Deskripsi Lengkap', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'umkm',
            label: 'UMKM',
            folder: 'src/content/umkm',
            create: true,
            delete: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Nama Usaha', name: 'nama_usaha', widget: 'string' },
              { label: 'Slug URL', name: 'slug', widget: 'string' },
              { label: 'Pemilik', name: 'pemilik', widget: 'string' },
              { label: 'Kategori', name: 'kategori', widget: 'string', required: false, hint: 'Contoh: Kerajinan, Kuliner, Pertanian, Jasa' },
              { label: 'Jenis Produk', name: 'jenis_produk', widget: 'string' },
              { label: 'Range Harga', name: 'harga_range', widget: 'string', required: false, hint: 'Contoh: Rp 15.000 - Rp 50.000' },
              { label: 'Nomor WhatsApp', name: 'kontak_wa', widget: 'string', hint: 'Format: 628XXXXXXXXX (tanpa spasi, tanda plus, atau tanda hubung)' },
              { label: 'Alamat', name: 'alamat', widget: 'string', required: false },
              { label: 'Foto Utama', name: 'foto_utama', widget: 'image', required: false, hint: 'Maks 5MB. Format: JPG, PNG, WebP' },
              { label: 'Galeri Produk', name: 'galeri_foto', widget: 'list', field: { label: 'Foto', name: 'foto', widget: 'image' }, required: false },
              { label: 'Status', name: 'status', widget: 'select', options: ['draft', 'published'], default: 'draft' },
              { label: 'Deskripsi Usaha', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'galeri',
            label: 'Galeri Foto',
            folder: 'src/content/galeri',
            create: true,
            delete: true,
            slug: '{{judul_foto}}',
            extension: 'json',
            format: 'json',
            fields: [
              { label: 'Judul Foto', name: 'judul_foto', widget: 'string' },
              { label: 'File Foto', name: 'file_foto', widget: 'image', hint: 'Maks 5MB. Format: JPG, PNG, WebP' },
              { label: 'Caption', name: 'caption', widget: 'text', required: false },
              { label: 'Album/Kategori', name: 'album', widget: 'string', default: 'Umum' },
              { label: 'Tanggal Upload', name: 'tanggal_upload', widget: 'datetime', date_format: 'YYYY-MM-DD', time_format: false },
              { label: 'Urutan', name: 'urutan', widget: 'number', default: 0 }
            ]
          },
          {
            name: 'perangkat-desa',
            label: 'Perangkat Desa',
            folder: 'src/content/perangkat-desa',
            create: true,
            delete: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Nama', name: 'nama', widget: 'string' },
              { label: 'Slug URL', name: 'slug', widget: 'string' },
              { label: 'Jabatan', name: 'jabatan', widget: 'string' },
              { label: 'Foto', name: 'foto', widget: 'image', required: false, hint: 'Maks 5MB. Format: JPG, PNG, WebP' },
              { label: 'Urutan Tampil', name: 'urutan', widget: 'number', default: 99 },
              { label: 'Level Hierarki', name: 'level_hierarki', widget: 'number', default: 1, hint: '1=Kepala Desa, 2=Sekretaris, 3=Kepala Seksi, 4=Staf' },
              { label: 'Atasan (slug)', name: 'parent_slug', widget: 'string', required: false, hint: 'Isi slug jabatan atasan langsung' },
              { label: 'Kontak', name: 'kontak', widget: 'string', required: false },
              { label: 'Tugas Pokok', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'faq',
            label: 'FAQ (Tanya Jawab)',
            folder: 'src/content/faq',
            create: true,
            delete: true,
            slug: '{{pertanyaan}}',
            fields: [
              { label: 'Pertanyaan', name: 'pertanyaan', widget: 'string' },
              { label: 'Kategori', name: 'kategori', widget: 'string', required: false },
              { label: 'Urutan', name: 'urutan', widget: 'number', default: 99 },
              { label: 'Jawaban', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'halaman-statis',
            label: 'Halaman Statis',
            folder: 'src/content/halaman-statis',
            create: false,
            delete: false,
            fields: [
              { label: 'Judul', name: 'judul', widget: 'string' },
              { label: 'Tipe Halaman', name: 'tipe', widget: 'select', options: ['profil-sejarah', 'profil-visi-misi', 'profil-lokasi', 'kontak-info'] },
              { label: 'Latitude (untuk peta)', name: 'lokasi_lat', widget: 'number', required: false, value_type: 'float' },
              { label: 'Longitude (untuk peta)', name: 'lokasi_lng', widget: 'number', required: false, value_type: 'float' },
              { label: 'Label Peta', name: 'lokasi_label', widget: 'string', required: false },
              { label: 'Konten', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });

    // Register preview styles to match site appearance
    CMS.registerPreviewStyle(`
      html {
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        line-height: 1.6;
        color: #1f2937;
      }
      body {
        padding: 2rem;
        max-width: 768px;
        margin: 0 auto;
      }
      h1 {
        font-size: 2rem;
        font-weight: 700;
        color: #111827;
        margin-bottom: 0.5rem;
        border-bottom: 3px solid #16a34a;
        padding-bottom: 0.5rem;
      }
      h2 {
        font-size: 1.5rem;
        font-weight: 600;
        color: #1f2937;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }
      h3 {
        font-size: 1.25rem;
        font-weight: 600;
        color: #374151;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
      }
      p {
        margin-bottom: 1rem;
        color: #374151;
      }
      img {
        max-width: 100%;
        height: auto;
        border-radius: 0.5rem;
        margin: 1rem 0;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
      a {
        color: #16a34a;
        text-decoration: underline;
      }
      ul, ol {
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      li {
        margin-bottom: 0.25rem;
      }
      blockquote {
        border-left: 4px solid #16a34a;
        padding-left: 1rem;
        margin: 1rem 0;
        color: #4b5563;
        font-style: italic;
        background: #f0fdf4;
        padding: 1rem;
        border-radius: 0 0.5rem 0.5rem 0;
      }
      code {
        background: #f3f4f6;
        padding: 0.2rem 0.4rem;
        border-radius: 0.25rem;
        font-size: 0.875em;
      }
      pre {
        background: #1f2937;
        color: #f9fafb;
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        margin: 1rem 0;
      }
      pre code {
        background: none;
        padding: 0;
        color: inherit;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 1rem 0;
      }
      th, td {
        border: 1px solid #e5e7eb;
        padding: 0.5rem 0.75rem;
        text-align: left;
      }
      th {
        background: #f9fafb;
        font-weight: 600;
      }
      hr {
        border: none;
        border-top: 2px solid #e5e7eb;
        margin: 2rem 0;
      }
      /* Meta info styling */
      .frame-content > div:first-child {
        font-family: system-ui, sans-serif;
      }
    `, { raw: true });
  </script>
</body>
</html>
